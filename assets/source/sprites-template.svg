<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1320" viewBox="0 0 1400 1320">

  <!-- Fondo gris para distinguir las áreas -->
  <rect width="1400" height="1320" fill="#e0e0e0"/>

  <!-- ─────────────────────────────────────────
       FRAME 1  (y: 0 – 400)
  ───────────────────────────────────────── -->
  <text x="20" y="22" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#888">Frame 1 de 3  —  dibuja MOLOLO. aquí</text>
  <rect x="0" y="30" width="1400" height="400" fill="black"/>
  <!-- Cruz guía -->
  <line x1="700" y1="30"  x2="700" y2="430" stroke="#333" stroke-width="1" stroke-dasharray="8,5"/>
  <line x1="0"   y1="230" x2="1400" y2="230" stroke="#333" stroke-width="1" stroke-dasharray="8,5"/>
  <!-- Borde del frame -->
  <rect x="0" y="30" width="1400" height="400" fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- ─────────────────────────────────────────
       FRAME 2  (y: 460 – 860)
  ───────────────────────────────────────── -->
  <text x="20" y="452" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#888">Frame 2 de 3  —  pequeñas variaciones de trazo respecto al 1</text>
  <rect x="0" y="460" width="1400" height="400" fill="black"/>
  <line x1="700" y1="460" x2="700" y2="860" stroke="#333" stroke-width="1" stroke-dasharray="8,5"/>
  <line x1="0"   y1="660" x2="1400" y2="660" stroke="#333" stroke-width="1" stroke-dasharray="8,5"/>
  <rect x="0" y="460" width="1400" height="400" fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- ─────────────────────────────────────────
       FRAME 3  (y: 920 – 1320)
  ───────────────────────────────────────── -->
  <text x="20" y="912" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#888">Frame 3 de 3  —  pequeñas variaciones de trazo respecto al 1</text>
  <rect x="0" y="920" width="1400" height="400" fill="black"/>
  <line x1="700" y1="920"  x2="700" y2="1320" stroke="#333" stroke-width="1" stroke-dasharray="8,5"/>
  <line x1="0"   y1="1120" x2="1400" y2="1120" stroke="#333" stroke-width="1" stroke-dasharray="8,5"/>
  <rect x="0" y="920" width="1400" height="400" fill="none" stroke="#555" stroke-width="1.5"/>

</svg>
