<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ojos 1.1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: white;
      overflow: hidden;
    }

    #grid {
      display: grid;
    }

    .eye {
      width: 100px;
      height: 100px;
      background-image: url('../assets/sprite-draw.png');
      background-size: 800px 800px; /* 2400 / 3 = 800 para escalar a 100px por celda */
      background-repeat: no-repeat;
      background-position: 0 0;
    }
  </style>
</head>
<body>
  <div id="grid"></div>
  <script>
    const CELL_SIZE = 100;
    const CELLS = 8;
    const RANGE_FACTOR = 0.3;

    const grid = document.getElementById('grid');

    const cols = Math.ceil(window.innerWidth / CELL_SIZE);
    const rows = Math.ceil(window.innerHeight / CELL_SIZE);
    const total = cols * rows;

    grid.style.gridTemplateColumns = `repeat(${cols}, ${CELL_SIZE}px)`;
    grid.style.gridTemplateRows = `repeat(${rows}, ${CELL_SIZE}px)`;
    grid.style.width = `${cols * CELL_SIZE}px`;
    grid.style.height = `${rows * CELL_SIZE}px`;

    for (let i = 0; i < total; i++) {
      const div = document.createElement('div');
      div.className = 'eye';
      grid.appendChild(div);
    }

    const eyes = document.querySelectorAll('.eye');

    let clickedEye = null;

    function setEyePosition(eyeEl, col, row) {
      eyeEl.style.backgroundPosition = `-${col * CELL_SIZE}px -${row * CELL_SIZE}px`;
    }

    function updateEye(eyeEl, cursorX, cursorY) {
      const rect = eyeEl.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      const dx = cursorX - cx;
      const dy = cursorY - cy;

      const range = Math.max(window.innerWidth, window.innerHeight) * RANGE_FACTOR;

      const nx = (dx / range + 1) / 2;
      const ny = (dy / range + 1) / 2;

      const col = Math.min(CELLS - 1, Math.max(0, Math.floor(nx * CELLS)));
      const row = Math.min(CELLS - 1, Math.max(0, Math.floor(ny * CELLS)));

      setEyePosition(eyeEl, col, row);
    }

    document.addEventListener('mousemove', (e) => {
      eyes.forEach(eye => {
        if (eye !== clickedEye) {
          updateEye(eye, e.clientX, e.clientY);
        }
      });
    });

    document.addEventListener('mousedown', (e) => {
      const target = e.target.closest('.eye');
      if (target) {
        clickedEye = target;
        setEyePosition(clickedEye, 4, 6);
      }
    });

    document.addEventListener('mouseup', (e) => {
      if (clickedEye) {
        updateEye(clickedEye, e.clientX, e.clientY);
        clickedEye = null;
      }
    });
  </script>
</body>
</html>
